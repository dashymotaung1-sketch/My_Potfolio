    <h1>Contact Me</h1>
    <p>Get in touch or book an appointment</p>

<section class="container">
    <h2>Booking Form</h2>
    <form action="#" method="POST" class="contact-form">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Your full name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Your email" required><br><br>

        <label for="phone">Phone:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Your phone number"><br><br>

        <label for="date">Preferred Date:</label><br>
        <input type="date" id="date" name="date" required><br><br>

        <label for="message">Message / Notes:</label><br>
        <textarea id="message" name="message" placeholder="Your message or inquiry" rows="4"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
</section>
